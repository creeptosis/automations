<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget · subscriptions</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111418; color: #e6e6e6; margin: 0; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { display: flex; align-items: baseline; margin-bottom: 4px; }
  h1 { font-size: 1.2em; margin: 0; }
  a.nav { color: #4da3ff; text-decoration: none; font-size: 0.9em; margin-left: 14px; }
  a.nav.first { margin-left: auto; }
  .sub { color: #9aa4b0; font-size: 0.85em; margin-bottom: 12px; }
  .banner { border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 0.95em;
            border: 1px solid #2c333d; background: #1a1f26; }
  .banner b { color: #4da3ff; }
  .card { background: #1a1f26; border: 1px solid #2c333d; border-radius: 10px; padding: 6px 16px; margin-bottom: 14px; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 8px 10px; border-top: 1px solid #262d36; font-size: 0.9em; }
  tr:first-child td { border-top: none; }
  th { color: #9aa4b0; text-align: left; font-weight: 600; font-size: 0.78em; padding: 8px 10px 4px; }
  th.n { text-align: right; }
  .n { text-align: right; white-space: nowrap; }
  .grey { color: #9aa4b0; }
  .soon { color: #fbbf24; }
  .undated td { color: #5b6572; }
  .undated a { color: #4da3ff; text-decoration: none; }
  .empty { color: #5b6572; font-size: 0.85em; padding: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>Budget · subscriptions</h1>
    <a class="nav first" href="/">&larr; budget</a><a class="nav" href="/life">life</a><a class="nav" href="/history">history</a><a class="nav" href="/reconcile">reconcile</a><a class="nav" href="/manage">manage</a>
  </header>
  <div class="sub">everything with a roll date — exact cost, next renewal</div>
  <div class="banner" id="banner">loading&hellip;</div>
  <div class="card"><table id="tbl"></table></div>
</div>
<script>
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt = v => "RM " + (Math.abs(v % 1) > 0.004
  ? v.toLocaleString("en-MY", {minimumFractionDigits: 2, maximumFractionDigits: 2})
  : v.toLocaleString("en-MY", {maximumFractionDigits: 0}));

async function load() {
  const s = await (await fetch("/api/summary")).json();
  const dated = [], undated = [];
  for (const c of s.categories)
    for (const e of c.items) {
      if (e.next_roll) dated.push({...e, category: c.name});
      else if (c.name === "Subscriptions") undated.push({...e, category: c.name});
    }
  dated.sort((a, b) => a.days_to_roll - b.days_to_roll);

  const totmo = dated.reduce((t, e) => t + e.monthly_eq, 0);
  document.getElementById("banner").innerHTML = dated.length
    ? `<b>${dated.length}</b> dated item${dated.length === 1 ? "" : "s"} · <b>${fmt(totmo)}</b>/mo equivalent` +
      ` · next: ${esc(dated[0].name)} in ${dated[0].days_to_roll}d`
    : 'nothing has a roll date yet — set one per item in <a href="/manage" style="color:#4da3ff">manage</a>';

  const rows = [];
  if (dated.length)
    rows.push(`<tr><th>item</th><th>exact cost</th><th>next roll</th><th class="n">in</th><th class="n">/mo</th></tr>`);
  for (const e of dated) {
    const soon = e.days_to_roll <= 14 ? " soon" : "";
    rows.push(`<tr><td>${esc(e.name)} <span class="grey">${esc(e.category)}</span></td>` +
              `<td>${fmt(e.amount)} <span class="grey">${e.cadence}</span></td>` +
              `<td>${e.next_roll}</td><td class="n${soon}">${e.days_to_roll}d</td>` +
              `<td class="n grey">${fmt(e.monthly_eq)}</td></tr>`);
  }
  for (const e of undated)
    rows.push(`<tr class="undated"><td>${esc(e.name)}</td><td>${fmt(e.amount)} ${e.cadence}</td>` +
              `<td colspan="3">no roll date — <a href="/manage">set in manage</a></td></tr>`);
  document.getElementById("tbl").innerHTML =
    rows.join("") || `<tr><td class="empty">no subscriptions or renewals yet</td></tr>`;
}
load();
</script>
</body>
</html>
