<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0d13">
<title>Budget</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32'%3E%3Cstop stop-color='%233ecf8e'/%3E%3Cstop offset='1' stop-color='%234f7cf0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Crect x='7' y='17' width='4.5' height='8' rx='2' fill='%23fff' opacity='.8'/%3E%3Crect x='13.75' y='12' width='4.5' height='13' rx='2' fill='%23fff' opacity='.9'/%3E%3Crect x='20.5' y='7' width='4.5' height='18' rx='2' fill='%23fff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/app.css?v=6">
</head>
<body data-page="home">
<header id="top"></header>
<main class="wrap">

  <section class="card hero">
    <div class="hero-main">
      <div>
        <div class="microlabel">surplus / mo</div>
        <div class="bignum" id="h-sur">&nbsp;</div>
        <div class="hero-sub" id="h-sursub"></div>
      </div>
      <div class="hero-side">
        <div>
          <div class="microlabel">net / mo</div>
          <div class="midnum" id="h-net">—</div>
          <div class="tiny" id="h-netsub"></div>
        </div>
        <div>
          <div class="microlabel">mapped</div>
          <div class="midnum" id="h-map">—</div>
          <div class="tiny" id="h-mapsub"></div>
        </div>
      </div>
    </div>
    <div class="allocbar" id="alloc" hidden></div>
  </section>

  <div class="inline-note" id="driftline" hidden></div>

  <h2 data-i="wallet">map <a class="linky" id="expandall">expand all</a></h2>
  <div class="card">
    <div class="skelwrap"><div class="skel" style="width:42%"></div><div class="skel" style="width:78%"></div><div class="skel" style="width:64%"></div><div class="skel" style="width:70%"></div></div>
    <table id="waterfall"></table>
  </div>

  <div id="upwrap" hidden>
    <h2 data-i="cal">upcoming · 90 days</h2>
    <div class="card"><table id="upcoming"></table></div>
  </div>

  <div id="goalwrap" hidden>
    <h2 data-i="flag">goals <span data-tip="goals"></span></h2>
    <div class="card" id="goals"></div>
  </div>

</main>
<script src="/static/app.js?v=8"></script>
<script>
const SEG = ["#5e8ef7", "#8b7cf6", "#c07af0", "#e57ab1", "#ef9366", "#e3bb56", "#56b4d3", "#6aa9e9", "#9d8ef2", "#d98a8a"];

function hero(s) {
  const sur = $("h-sur"), sub = $("h-sursub");
  if (!s.incomes.length) {
    sur.textContent = "—";
    sur.className = "bignum";
    sub.innerHTML = 'no income set yet — start in <a href="/plan">plan</a>';
    $("h-net").textContent = "—";
    $("h-map").textContent = "—";
    $("h-netsub").textContent = "";
    $("h-mapsub").textContent = "";
    $("alloc").hidden = true;
    return;
  }
  sur.textContent = fmt(s.surplus);
  sur.className = "bignum " + (s.surplus < 0 ? "isneg" : "ispos");
  sub.textContent = pc(s.surplus_pct) + " of net";
  $("h-net").textContent = fmt(s.net);
  $("h-netsub").textContent = "gross " + fmt(s.gross);
  $("h-map").textContent = fmt(s.mapped);
  $("h-mapsub").textContent = pc(s.mapped_pct) + " of net";
  alloc(s);
}

function alloc(s) {
  const bar = $("alloc");
  const cats = s.categories.filter(c => c.monthly > 0).sort((a, b) => b.monthly - a.monthly);
  if (!cats.length || s.net <= 0) { bar.hidden = true; return; }
  const denom = Math.max(s.net, s.mapped);
  const segs = cats.map((c, i) =>
    `<div class="seg" style="width:${(100 * c.monthly / denom).toFixed(2)}%;background:${SEG[i % SEG.length]}"` +
    ` title="${esc(c.name)} · ${fmt(c.monthly)}/mo (${pc(c.pct_of_net)})"></div>`);
  if (s.surplus > 0)
    segs.push(`<div class="seg sur" style="width:${(100 * s.surplus / denom).toFixed(2)}%"` +
              ` title="surplus · ${fmt(s.surplus)}/mo (${pc(s.surplus_pct)})"></div>`);
  bar.innerHTML = segs.join("");
  bar.hidden = false;
}

function itemCells(e) {
  const pills = [];
  if (e.cadence !== "monthly") pills.push(`<span class="pill">${e.cadence} ${fmt(e.amount)}</span>`);
  if (e.is_estimate) pills.push('<span class="pill" title="estimate">≈</span>');
  if (e.ended) pills.push('<span class="pill">ended</span>');
  else if (e.ends_on) pills.push(`<span class="pill">until ${e.ends_on}</span>`);
  const roll = e.next_roll
    ? `<span class="pill${e.days_to_roll <= 14 ? " warn" : ""}" title="renews ${e.next_roll}">${e.days_to_roll}d</span>`
    : "";
  return `<td class="subpad mut">${esc(e.name)}${pills.length ? " " + pills.join(" ") : ""}</td>` +
         `<td class="n mut">${fmt(e.monthly_eq)}</td><td class="pct">${roll}</td>`;
}

function waterfall(s) {
  const rows = [];
  rows.push(`<tr><td>gross income</td><td class="n">${fmt(s.gross)}</td><td class="pct"></td></tr>`);
  for (const d of s.deductions)
    rows.push(`<tr><td class="subpad mut">${esc(d.name)}</td><td class="n mut">− ${fmt(d.amount_monthly)}</td><td class="pct"></td></tr>`);
  rows.push(`<tr class="total net"><td>net income</td><td class="n">${fmt(s.net)}</td><td class="pct">100%</td></tr>`);
  const cats = s.categories.filter(c => c.items.length).sort((a, b) => b.monthly - a.monthly);
  for (const c of cats) {
    rows.push(`<tr class="rowlink" onclick="toggle(${c.id}, this)">` +
              `<td><span class="chev">${ICON.chev}</span>${esc(c.name)}</td>` +
              `<td class="n">${fmt(c.monthly)}</td><td class="pct">${pc(c.pct_of_net)}</td></tr>`);
    for (const e of c.items.sort((a, b) => b.monthly_eq - a.monthly_eq)) {
      rows.push(`<tr class="item c${c.id}" hidden>${itemCells(e)}</tr>`);
      // breakdown pieces, normalised to /mo like everything else on the map
      const subs = e.subitems || [];
      if (e.ended || !subs.length) continue;
      const per = {monthly: 1, quarterly: 3, "half-yearly": 6, yearly: 12}[e.cadence] || 1;
      let sum = 0;
      for (const p of subs) {
        const mo = p.amount / per;
        sum += mo;
        rows.push(`<tr class="item c${c.id}" hidden><td class="subpad2 dim">${esc(p.name)}` +
                  `${p.note ? ` · ${esc(p.note)}` : ""}</td>` +
                  `<td class="n dim">${fmt(mo)}</td><td class="pct"></td></tr>`);
      }
      const left = Math.round((e.monthly_eq - sum) * 100) / 100;
      rows.push(`<tr class="item c${c.id}" hidden><td class="subpad2 dim">unaccounted</td>` +
                `<td class="n dim${left < 0 ? " neg" : ""}">${fmt(left)}</td><td class="pct"></td></tr>`);
    }
  }
  rows.push(`<tr class="total surplus${s.surplus < 0 ? " neg" : ""}"><td>surplus</td>` +
            `<td class="n">${fmt(s.surplus)}</td><td class="pct">${pc(s.surplus_pct)}</td></tr>`);
  if (s.investments.length) {
    for (const v of s.investments)
      rows.push(`<tr><td class="subpad mut">→ ${esc(v.name)}</td>` +
                `<td class="n mut">${fmt(v.monthly)}</td>` +
                `<td class="pct">${v.mode === "rest" ? "the rest" : pc(v.pct_of_net) + " of net"}</td></tr>`);
    rows.push(`<tr class="total"><td>free for goals</td><td class="n">${fmt(s.free_monthly)}</td>` +
              `<td class="pct">${s.net > 0 ? pc(100 * s.free_monthly / s.net) : ""}</td></tr>`);
  }
  $("waterfall").innerHTML = rows.join("");
}

function toggle(id, row) {
  row.classList.toggle("open");
  document.querySelectorAll(".item.c" + id).forEach(r => r.hidden = !r.hidden);
}

let allOpen = false;
$("expandall").addEventListener("click", () => {
  allOpen = !allOpen;
  document.querySelectorAll("#waterfall tr.rowlink").forEach(r => r.classList.toggle("open", allOpen));
  document.querySelectorAll("#waterfall tr.item").forEach(r => r.hidden = !allOpen);
  $("expandall").textContent = allOpen ? "collapse all" : "expand all";
});

function goals(s) {
  // standing routes live in investments; this section only exists while a
  // finite dated pot does
  $("goalwrap").hidden = !s.goals.length;
  if (!s.goals.length) return;
  const out = [];
  for (const g of s.goals) {
    const done = g.remaining <= 0;
    const donePct = Math.min(100, 100 * g.contributed / g.target_amount);
    const projPct = Math.min(100 - donePct, 100 * g.projected_by_deadline / g.target_amount);
    let sub;
    if (done) {
      sub = '<span class="pill ok">target reached</span>';
    } else if (g.months_left <= 0) {
      sub = '<span class="pill bad">deadline passed</span>';
    } else if (!s.incomes.length || g.surplus_monthly <= 0) {
      sub = `needs ${fmt(g.required_monthly)}/mo · no surplus available`;
    } else {
      sub = `needs ${fmt(g.required_monthly)}/mo to hit target · surplus gives <b>${fmt(g.surplus_monthly)}/mo` +
            ` → ${fmt(g.projected_by_deadline)}</b> by ${g.deadline} (covers ${pc(g.coverage_pct)} of the gap)`;
    }
    out.push(`<div class="goal">
      <div class="goal-top"><span class="goal-name">${esc(g.name)}${g.yearly ? ' <span class="pill">resets yearly</span>' : ""}</span>` +
      `<span class="goal-meta">${fmt(g.contributed)} in · gap ${fmt(Math.max(0, g.remaining))} · ${g.months_left} mo left</span></div>
      <div class="track"><div class="fill done" style="width:${donePct}%"></div><div class="fill proj" style="width:${projPct}%"></div></div>
      <div class="goal-sub">${sub}</div>
    </div>`);
  }
  $("goals").innerHTML = out.join("");
}

function upcoming(s) {
  const wrap = $("upwrap");
  wrap.hidden = !s.upcoming.length;
  if (wrap.hidden) return;
  const rows = [`<tr><th>when</th><th>item</th><th></th><th class="n">amount</th></tr>`];
  for (const u of s.upcoming) {
    const od = u.days < 0;
    const chip = od ? `<span class="pill bad">${-u.days}d late</span>`
                    : `<span class="pill${u.days <= 14 ? " warn" : ""}">in ${u.days}d</span>`;
    const amt = u.amount == null ? "–" : (u.expected ? "~ " : "") + fmt(u.amount);
    const name = u.invest ? `<span class="ic-invest">${ICON.trend}</span>${esc(u.name)}` : esc(u.name);
    rows.push(`<tr><td class="datecell">${u.on} ${chip}</td><td>${name}</td>` +
              `<td class="mut">${esc(u.category)}</td><td class="n">${amt}</td></tr>`);
  }
  // transfers to investments aren't spending — they get their own total line
  const spend = s.upcoming.filter(u => !u.invest);
  const invest = s.upcoming.filter(u => u.invest);
  if (s.upcoming.length > 1) {
    if (spend.length) {
      const known = spend.filter(u => u.amount != null);
      const approx = spend.some(u => u.expected || u.amount == null);
      rows.push(`<tr class="total"><td></td><td>spending</td><td></td>` +
                `<td class="n">${approx ? "~ " : ""}${fmt(known.reduce((t, u) => t + u.amount, 0))}</td></tr>`);
    }
    if (invest.length)
      rows.push(`<tr class="total"><td></td><td>to investments</td><td></td>` +
                `<td class="n">${fmt(invest.reduce((t, u) => t + u.amount, 0))}</td></tr>`);
  }
  $("upcoming").innerHTML = rows.join("");
}

function driftline(s) {
  const el = $("driftline"), d = s.drift;
  el.hidden = !(d && Math.abs(d.gap_monthly) >= 100);
  if (el.hidden) return;
  const over = d.gap_monthly < 0;
  el.className = "inline-note " + (over ? "neg" : "pos");
  el.textContent = `drift check: ~${fmt(Math.abs(d.gap_monthly))}/mo ` +
    (over ? "unmapped spending" : "better than plan") + ` (${d.from} → ${d.to})`;
}

async function load() {
  const s = await getJSON("/api/summary");
  hero(s); waterfall(s); goals(s); upcoming(s); driftline(s);
  unskel();
}
load().catch(e => { skelFail(); console.error(e); });
</script>
</body>
</html>
