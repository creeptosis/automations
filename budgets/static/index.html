<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111418; color: #e6e6e6; margin: 0; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { display: flex; align-items: baseline; margin-bottom: 4px; }
  h1 { font-size: 1.2em; margin: 0; }
  a.nav { color: #4da3ff; text-decoration: none; font-size: 0.9em; margin-left: 14px; }
  a.nav.first { margin-left: auto; }
  .sub { color: #9aa4b0; font-size: 0.85em; margin-bottom: 12px; }
  .banner { border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 0.95em;
            border: 1px solid #2c333d; background: #1a1f26; }
  .banner b { color: #4ade80; }
  .banner.neg b { color: #f87171; }
  .banner a { color: #4da3ff; }
  .card { background: #1a1f26; border: 1px solid #2c333d; border-radius: 10px; padding: 6px 16px; margin-bottom: 14px; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 8px 10px; border-top: 1px solid #262d36; font-size: 0.9em; }
  tr:first-child td { border-top: none; }
  .n { text-align: right; white-space: nowrap; }
  .pct { color: #9aa4b0; text-align: right; width: 64px; white-space: nowrap; font-size: 0.95em; }
  .grey { color: #9aa4b0; }
  tr.total td { font-weight: 700; }
  tr.net td { color: #4da3ff; }
  tr.surplus td { color: #4ade80; }
  tr.surplus.neg td { color: #f87171; }
  tr.cat { cursor: pointer; }
  tr.item td { border-top: none; padding: 0 10px 7px 26px; color: #9aa4b0; font-size: 0.82em; }
  .od { color: #f87171; }
  .goal { margin: 4px 0 16px; }
  .goal .line1 { font-size: 0.95em; }
  .goal .line1 b { color: #e6e6e6; }
  .goal .line2 { color: #9aa4b0; font-size: 0.84em; margin-top: 3px; }
  .goal .line2 b { color: #4ade80; font-weight: 600; }
  .barwrap { background: #12161b; border-radius: 4px; height: 6px; margin-top: 7px; overflow: hidden; }
  .bar { background: #4da3ff; height: 6px; float: left; }
  .bar.proj { background: #2b5c8a; }
  h2 { font-size: 0.8em; color: #9aa4b0; font-weight: 600; letter-spacing: 0.08em; margin: 18px 0 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>Budget</h1><a class="nav first" href="/subs">subs</a><a class="nav" href="/life">life</a><a class="nav" href="/history">history</a><a class="nav" href="/reconcile">reconcile</a><a class="nav" href="/manage">manage</a></header>
  <div class="sub">net income &rarr; categories &rarr; surplus &rarr; goals</div>
  <div class="banner" id="banner">loading&hellip;</div>
  <div class="sub" id="driftline" hidden></div>
  <div class="card"><table id="waterfall"></table></div>
  <h2>GOALS</h2>
  <div id="goals"></div>
  <div id="upwrap" hidden>
    <h2>UPCOMING (90 DAYS)</h2>
    <div class="card"><table id="upcoming"></table></div>
  </div>
</div>
<script>
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt = v => "RM " + (Math.abs(v % 1) > 0.004
  ? v.toLocaleString("en-MY", {minimumFractionDigits: 2, maximumFractionDigits: 2})
  : v.toLocaleString("en-MY", {maximumFractionDigits: 0}));
const pc = v => v == null ? "–" : v.toFixed(1) + "%";

function banner(s) {
  const el = document.getElementById("banner");
  if (!s.incomes.length) {
    el.innerHTML = 'no income set yet — start in <a href="/manage">manage</a>';
    return;
  }
  el.classList.toggle("neg", s.surplus < 0);
  el.innerHTML = `net <b>${fmt(s.net)}</b>/mo · mapped ${fmt(s.mapped)} (${pc(s.mapped_pct)})` +
                 ` · surplus <b>${fmt(s.surplus)}</b>/mo (${pc(s.surplus_pct)})`;
}

function itemLine(e) {
  let t = esc(e.name) + (e.is_estimate ? " ≈" : "") + " · " + fmt(e.monthly_eq) + "/mo";
  if (e.cadence !== "monthly") t += ` (${e.cadence} ${fmt(e.amount)})`;
  if (e.next_roll) t += ` · renews ${e.next_roll} (${e.days_to_roll}d)`;
  return t;
}

function waterfall(s) {
  const rows = [];
  rows.push(`<tr><td>gross income</td><td class="n">${fmt(s.gross)}</td><td class="pct"></td></tr>`);
  for (const d of s.deductions)
    rows.push(`<tr><td class="grey" style="padding-left:26px">${esc(d.name)}</td>` +
              `<td class="n grey">− ${fmt(d.amount_monthly)}</td><td class="pct"></td></tr>`);
  rows.push(`<tr class="total net"><td>net income</td><td class="n">${fmt(s.net)}</td><td class="pct">100%</td></tr>`);
  const cats = s.categories.filter(c => c.items.length).sort((a, b) => b.monthly - a.monthly);
  for (const c of cats) {
    rows.push(`<tr class="cat" onclick="toggle(${c.id})"><td>${esc(c.name)}</td>` +
              `<td class="n">${fmt(c.monthly)}</td><td class="pct">${pc(c.pct_of_net)}</td></tr>`);
    for (const e of c.items.sort((a, b) => b.monthly_eq - a.monthly_eq))
      rows.push(`<tr class="item c${c.id}" hidden><td colspan="3">${itemLine(e)}</td></tr>`);
  }
  const neg = s.surplus < 0 ? " neg" : "";
  rows.push(`<tr class="total surplus${neg}"><td>surplus</td><td class="n">${fmt(s.surplus)}</td>` +
            `<td class="pct">${pc(s.surplus_pct)}</td></tr>`);
  document.getElementById("waterfall").innerHTML = rows.join("");
}

function toggle(id) {
  document.querySelectorAll(".item.c" + id).forEach(r => r.hidden = !r.hidden);
}

function goals(s) {
  const out = [];
  for (const g of s.goals) {
    const done = g.remaining <= 0;
    const donePct = Math.min(100, 100 * g.contributed / g.target_amount);
    const projPct = Math.min(100 - donePct, 100 * g.projected_by_deadline / g.target_amount);
    let line2;
    if (done) {
      line2 = "target reached";
    } else if (g.months_left <= 0) {
      line2 = "deadline passed";
    } else if (!s.incomes.length || g.surplus_monthly <= 0) {
      line2 = `needs ${fmt(g.required_monthly)}/mo · no surplus available`;
    } else {
      line2 = `needs ${fmt(g.required_monthly)}/mo to hit target · surplus gives <b>${fmt(g.surplus_monthly)}/mo` +
              ` → ${fmt(g.projected_by_deadline)}</b> by ${g.deadline} (covers ${pc(g.coverage_pct)} of the gap)`;
    }
    out.push(`<div class="goal">
      <div class="line1"><b>${esc(g.name)}</b> · ${fmt(g.contributed)} in · gap ${fmt(Math.max(0, g.remaining))}` +
      ` · ${g.months_left} mo left</div>
      <div class="line2">${line2}</div>
      <div class="barwrap"><div class="bar" style="width:${donePct}%"></div>` +
      `<div class="bar proj" style="width:${projPct}%"></div></div>
    </div>`);
  }
  document.getElementById("goals").innerHTML = out.join("") || '<div class="grey" style="font-size:0.85em">no goals yet</div>';
}

function upcoming(s) {
  const wrap = document.getElementById("upwrap");
  wrap.hidden = !s.upcoming.length;
  if (wrap.hidden) return;
  const rows = s.upcoming.map(u => {
    const od = u.days < 0;
    const amt = u.amount == null ? "–" : (u.expected ? "~ " : "") + fmt(u.amount);
    return `<tr><td class="${od ? "od" : "grey"}" style="width:130px">${u.on}${od ? ` (${-u.days}d)` : ""}</td>` +
      `<td>${esc(u.name)} <span class="grey">${esc(u.category)}</span></td><td class="n">${amt}</td></tr>`;
  });
  if (s.upcoming.length > 1) {
    const known = s.upcoming.filter(u => u.amount != null);
    const approx = s.upcoming.some(u => u.expected || u.amount == null);
    const tot = known.reduce((t, u) => t + u.amount, 0);
    rows.push(`<tr class="total"><td></td><td>total</td><td class="n">${approx ? "~ " : ""}${fmt(tot)}</td></tr>`);
  }
  document.getElementById("upcoming").innerHTML = rows.join("");
}

function driftline(s) {
  const el = document.getElementById("driftline"), d = s.drift;
  el.hidden = !(d && Math.abs(d.gap_monthly) >= 100);
  if (el.hidden) return;
  const over = d.gap_monthly < 0;
  el.style.color = over ? "#f87171" : "#4ade80";
  el.textContent = `drift check: ~${fmt(Math.abs(d.gap_monthly))}/mo ` +
    (over ? "unmapped spending" : "better than plan") + ` (${d.from} → ${d.to})`;
}

async function load() {
  const s = await (await fetch("/api/summary")).json();
  banner(s); waterfall(s); goals(s); upcoming(s); driftline(s);
}
load();
</script>
</body>
</html>
