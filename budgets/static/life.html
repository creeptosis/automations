<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget · life</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111418; color: #e6e6e6; margin: 0; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { display: flex; align-items: baseline; margin-bottom: 4px; }
  h1 { font-size: 1.2em; margin: 0; }
  a.nav { color: #4da3ff; text-decoration: none; font-size: 0.9em; margin-left: 14px; }
  a.nav.first { margin-left: auto; }
  .sub { color: #9aa4b0; font-size: 0.85em; margin-bottom: 12px; }
  .banner { border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 0.95em;
            border: 1px solid #2c333d; background: #1a1f26; }
  .banner b { color: #4da3ff; }
  .banner .od { color: #f87171; font-weight: 700; }
  .card { background: #1a1f26; border: 1px solid #2c333d; border-radius: 10px; padding: 6px 16px; margin-bottom: 14px; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 8px 10px; border-top: 1px solid #262d36; font-size: 0.9em; }
  tr:first-child td { border-top: none; }
  th { color: #9aa4b0; text-align: left; font-weight: 600; font-size: 0.78em; padding: 8px 10px 4px; }
  th.n { text-align: right; }
  .n { text-align: right; white-space: nowrap; }
  .grey { color: #9aa4b0; }
  .dim { color: #5b6572; }
  .soon { color: #fbbf24; }
  .od { color: #f87171; }
  tr.trk { cursor: pointer; }
  tr.hist td { border-top: none; padding: 0 10px 6px 26px; color: #9aa4b0; font-size: 0.82em; }
  tr.hist a { color: #5b6572; text-decoration: none; padding: 0 4px; }
  tr.hist a:hover { color: #e6e6e6; }
  tr.logrow td { border-top: none; padding: 2px 10px 10px 26px; }
  form.log { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  input, button { background: #1e242c; color: #e6e6e6; border: 1px solid #2c333d; border-radius: 6px; padding: 5px 8px; font-size: 0.82em; font-family: inherit; }
  input::placeholder { color: #5b6572; }
  input[type=number] { width: 90px; }
  input[type=date] { width: 130px; }
  button { background: #2b3a4d; border-color: #3d5878; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>Budget · life</h1>
    <a class="nav first" href="/">&larr; budget</a><a class="nav" href="/subs">subs</a><a class="nav" href="/history">history</a><a class="nav" href="/reconcile">reconcile</a><a class="nav" href="/manage">manage</a>
  </header>
  <div class="sub">when did I last &hellip; / when is it due &mdash; click a row to see history and log</div>
  <div class="banner" id="banner">loading&hellip;</div>
  <div class="card"><table id="tbl"></table></div>
</div>
<script>
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt = v => "RM " + (Math.abs(v % 1) > 0.004
  ? v.toLocaleString("en-MY", {minimumFractionDigits: 2, maximumFractionDigits: 2})
  : v.toLocaleString("en-MY", {maximumFractionDigits: 0}));
let TODAY;

function ago(iso) {
  const d = Math.round((new Date(TODAY) - new Date(iso)) / 86400000);
  if (d === 0) return "today";
  if (d < 60) return d + "d ago";
  return (d / 30.44).toFixed(1) + " mo ago";
}

function dueCell(t) {
  if (!t.interval_months) return '<span class="dim">log only</span>';
  if (!t.last) return '<span class="dim">no history</span>';
  const d = t.days_to_due;
  if (d < 0) return `${t.next_due} <span class="od">overdue ${-d}d</span>`;
  const cls = d <= 14 ? "soon" : "grey";
  return `${t.next_due} <span class="${cls}">in ${d}d</span>`;
}

function render(s) {
  TODAY = s.as_of;
  const overdue = s.trackers.filter(t => t.days_to_due < 0);
  const dues = s.trackers.filter(t => t.days_to_due != null && t.days_to_due >= 0)
                         .sort((a, b) => a.days_to_due - b.days_to_due);
  document.getElementById("banner").innerHTML =
    `<b>${s.trackers.length}</b> trackers` +
    (overdue.length ? ` · <span class="od">${overdue.length} overdue</span>` : "") +
    (dues.length ? ` · next due: ${esc(dues[0].name)} in ${dues[0].days_to_due}d` : "");

  const rows = [`<tr><th>tracker</th><th>last done</th><th class="n">cost then</th><th>every</th><th>next due</th></tr>`];
  for (const t of s.trackers) {
    rows.push(`<tr class="trk" onclick="toggle(${t.id})">` +
      `<td>${esc(t.name)}</td>` +
      `<td>${t.last ? `${t.last.on_date} <span class="grey">${ago(t.last.on_date)}</span>` : '<span class="dim">never logged</span>'}</td>` +
      `<td class="n grey">${t.last && t.last.cost != null ? fmt(t.last.cost) : ""}</td>` +
      `<td class="grey">${t.interval_months ? t.interval_months + " mo" : ""}</td>` +
      `<td>${dueCell(t)}</td></tr>`);
    for (const e of t.entries)
      rows.push(`<tr class="hist t${t.id}" hidden><td colspan="5">${e.on_date}` +
        `${e.cost != null ? " · " + fmt(e.cost) : ""}${e.note ? " · " + esc(e.note) : ""}` +
        ` <a onclick="delEntry(event,${e.id})" title="delete">&#10005;</a></td></tr>`);
    rows.push(`<tr class="logrow t${t.id}" hidden><td colspan="5">` +
      `<form class="log" onsubmit="return logEntry(event,${t.id})">` +
      `<input type="date" name="on_date" value="${s.as_of}" required>` +
      `<input type="number" name="cost" step="0.01" min="0" placeholder="RM (optional)">` +
      `<input name="note" placeholder="note (optional)" style="flex:1;min-width:120px">` +
      `<button>log</button></form></td></tr>`);
  }
  document.getElementById("tbl").innerHTML = rows.join("");
}

function toggle(id) {
  document.querySelectorAll(".t" + id).forEach(r => r.hidden = !r.hidden);
}

async function logEntry(ev, id) {
  ev.preventDefault();
  const f = ev.target, data = {tracker_id: id};
  for (const el of f.elements) if (el.name) data[el.name] = el.value;
  const r = await fetch("/api/entry", {method: "POST",
    headers: {"Content-Type": "application/json"}, body: JSON.stringify(data)});
  if (!r.ok) alert((await r.json()).error || "error");
  await load();
  return false;
}

async function delEntry(ev, id) {
  ev.stopPropagation();
  if (!confirm("delete this entry?")) return;
  await fetch("/api/entry/" + id, {method: "DELETE"});
  await load();
}

async function load() {
  const s = await (await fetch("/api/summary")).json();
  render(s);
}
load();
</script>
</body>
</html>
